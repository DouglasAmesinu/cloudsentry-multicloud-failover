upstream app {
    server app:5000;
}
server {
    listen 80;
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
    location /health {
        proxy_pass http://app/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }
}
